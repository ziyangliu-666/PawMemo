name: Release Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Pack npm tarball
        id: pack
        run: |
          npm pack
          package_tgz="$(ls -t ./*.tgz | head -n 1)"
          echo "package_tgz=${package_tgz#./}" >> "$GITHUB_OUTPUT"

      - name: Publish release asset
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_TGZ: ${{ steps.pack.outputs.package_tgz }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$PACKAGE_TGZ" --clobber
          else
            gh release create "$TAG_NAME" "$PACKAGE_TGZ" --generate-notes --title "$TAG_NAME"
          fi
